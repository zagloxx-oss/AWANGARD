<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWANGARD.COM | Dark Edition</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase SDK (только для Google входа) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        
        // Ваши данные Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBbr2tOvtdFEbs-wia9L86S8Vr3vvzOQPM",
            authDomain: "awangard-hsop.firebaseapp.com",
            projectId: "awangard-hsop",
            storageBucket: "awangard-hsop.firebasestorage.app",
            messagingSenderId: "482556975147",
            appId: "1:482556975147:web:e301d8da03bf88008ef26e",
            measurementId: "G-4KEVY4F5B7"
        };
        
        // Инициализация Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();
        
        // Элементы DOM
        const authButtons = document.getElementById('authButtons');
        const userInfo = document.getElementById('userInfo');
        const userName = document.getElementById('userName');
        const userEmail = document.getElementById('userEmail');
        const userAvatar = document.getElementById('userAvatar');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const profilePanel = document.getElementById('profilePanel');
        
        // Функция входа через Google
        async function loginWithGoogle() {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                console.log("Успешный вход через Google:", result.user);
                // Очищаем Telegram данные при входе через Google
                localStorage.removeItem('telegram_user');
            } catch (error) {
                console.error("Ошибка входа:", error);
                alert("Ошибка входа: " + error.message);
            }
        }
        
        // Функция выхода (выход из Google и Telegram)
        async function logout() {
            try {
                // Выход из Google (если был)
                if (auth.currentUser) {
                    await signOut(auth);
                }
                // Очищаем данные Telegram
                localStorage.removeItem('telegram_user');
                console.log("Выход выполнен");
                // Обновляем интерфейс
                updateUIForLogout();
            } catch (error) {
                console.error("Ошибка выхода:", error);
            }
        }
        
        // Функция обновления интерфейса при выходе
        function updateUIForLogout() {
            authButtons.style.display = 'flex';
            userInfo.style.display = 'none';
            profilePanel.classList.remove('logged-in');
            document.getElementById('profileName').textContent = 'Гость';
            document.getElementById('profileEmail').textContent = 'войдите для доступа к профилю';
            document.getElementById('profileAvatar').src = 'https://ui-avatars.com/api/?background=2c3e66&color=fff&bold=true&name=Guest';
            document.getElementById('profileId').textContent = 'guest';
        }
        
        // Функция обновления профиля в боковой панели
        function updateProfilePanel(user) {
            // Проверяем, есть ли Telegram пользователь в localStorage
            const telegramUser = localStorage.getItem('telegram_user');
            
            if (user) {
                // Google пользователь
                profilePanel.classList.add('logged-in');
                document.getElementById('profileName').textContent = user.displayName || "Пользователь";
                document.getElementById('profileEmail').textContent = user.email || "email не указан";
                if (user.photoURL) {
                    document.getElementById('profileAvatar').src = user.photoURL;
                } else {
                    document.getElementById('profileAvatar').src = 'https://ui-avatars.com/api/?background=2c3e66&color=fff&bold=true&name=' + encodeURIComponent(user.displayName || 'User');
                }
                const userId = user.uid.substring(0, 8);
                document.getElementById('profileId').textContent = userId;
                
                localStorage.setItem('lastUser', JSON.stringify({
                    type: 'google',
                    displayName: user.displayName,
                    email: user.email,
                    photoURL: user.photoURL,
                    uid: user.uid
                }));
            } else if (telegramUser) {
                // Telegram пользователь
                const tgUser = JSON.parse(telegramUser);
                profilePanel.classList.add('logged-in');
                document.getElementById('profileName').textContent = tgUser.first_name + ' ' + (tgUser.last_name || '');
                document.getElementById('profileEmail').textContent = tgUser.username ? '@' + tgUser.username : 'telegram пользователь';
                if (tgUser.photo_url) {
                    document.getElementById('profileAvatar').src = tgUser.photo_url;
                } else {
                    document.getElementById('profileAvatar').src = 'https://ui-avatars.com/api/?background=2c3e66&color=fff&bold=true&name=' + encodeURIComponent(tgUser.first_name);
                }
                document.getElementById('profileId').textContent = tgUser.id;
                
                // Скрываем кнопки авторизации в шапке, показываем информацию о пользователе
                authButtons.style.display = 'none';
                userInfo.style.display = 'flex';
                userName.textContent = tgUser.first_name + ' ' + (tgUser.last_name || '');
                userEmail.textContent = tgUser.username ? '@' + tgUser.username : '';
                if (tgUser.photo_url) {
                    userAvatar.src = tgUser.photo_url;
                    userAvatar.style.display = 'block';
                } else {
                    userAvatar.style.display = 'none';
                }
                
                localStorage.setItem('lastUser', JSON.stringify({
                    type: 'telegram',
                    displayName: tgUser.first_name + ' ' + (tgUser.last_name || ''),
                    username: tgUser.username,
                    photoURL: tgUser.photo_url,
                    id: tgUser.id
                }));
            } else {
                // Гость - проверяем, есть ли сохранённый последний пользователь
                const lastUser = localStorage.getItem('lastUser');
                if (lastUser && !telegramUser && !user) {
                    const userData = JSON.parse(lastUser);
                    profilePanel.classList.add('logged-in');
                    document.getElementById('profileName').textContent = userData.displayName || "Пользователь";
                    document.getElementById('profileEmail').textContent = userData.email || userData.username || "пользователь";
                    if (userData.photoURL) {
                        document.getElementById('profileAvatar').src = userData.photoURL;
                    } else {
                        document.getElementById('profileAvatar').src = 'https://ui-avatars.com/api/?background=2c3e66&color=fff&bold=true&name=' + encodeURIComponent(userData.displayName || 'User');
                    }
                    document.getElementById('profileId').textContent = userData.id || userData.uid?.substring(0, 8) || 'guest';
                } else {
                    profilePanel.classList.remove('logged-in');
                }
            }
        }
        
        // Функция для обработки входа через Telegram
        window.onTelegramAuth = function(user) {
            // Сохраняем данные пользователя в localStorage
            localStorage.setItem('telegram_user', JSON.stringify(user));
            alert('Добро пожаловать, ' + user.first_name + ' ' + (user.last_name || '') + '!');
            // Обновляем интерфейс
            updateProfilePanel(null);
            location.reload(); // Перезагружаем страницу для обновления интерфейса
        };
        
        // Отслеживание состояния авторизации Google
        onAuthStateChanged(auth, (user) => {
            const telegramUser = localStorage.getItem('telegram_user');
            
            if (user) {
                // Google пользователь
                authButtons.style.display = 'none';
                userInfo.style.display = 'flex';
                userName.textContent = user.displayName || user.email || "Пользователь";
                userEmail.textContent = user.email || "";
                if (user.photoURL) {
                    userAvatar.src = user.photoURL;
                    userAvatar.style.display = 'block';
                } else {
                    userAvatar.style.display = 'none';
                }
            } else if (telegramUser) {
                // Telegram пользователь
                const tgUser = JSON.parse(telegramUser);
                authButtons.style.display = 'none';
                userInfo.style.display = 'flex';
                userName.textContent = tgUser.first_name + ' ' + (tgUser.last_name || '');
                userEmail.textContent = tgUser.username ? '@' + tgUser.username : '';
                if (tgUser.photo_url) {
                    userAvatar.src = tgUser.photo_url;
                    userAvatar.style.display = 'block';
                } else {
                    userAvatar.style.display = 'none';
                }
            } else {
                // Не авторизован никто
                authButtons.style.display = 'flex';
                userInfo.style.display = 'none';
            }
            updateProfilePanel(user);
        });
        
        // Назначаем обработчики кнопок
        if (loginBtn) loginBtn.addEventListener('click', loginWithGoogle);
        if (logoutBtn) logoutBtn.addEventListener('click', logout);
        
        window.loginWithGoogle = loginWithGoogle;
    </script>
    
    <!-- Telegram Login Widget -->
    <script async src="https://telegram.org/js/telegram-widget.js?23" 
            data-telegram-login="awangard_shop_bot" 
            data-size="large" 
            data-onauth="onTelegramAuth(user)" 
            data-request-access="write">
    </script>
</head>
<body class="dark-theme">
    <header>
        <h1>🌙 кукусики!</h1>
        <nav>
            <a href="#" id="homeLink" class="active">Главная</a>
            <a href="#" id="aboutLink">О нас</a>
            <a href="https://vk.com/vip_kotik_1" target="_blank">📱 Мой ВК</a>
        </nav>
        
        <!-- Блок авторизации (показывается неавторизованным) -->
        <div id="authButtons" class="auth-buttons-header">
            <button id="loginBtn" class="auth-btn-small google-btn-small">🔐 Google</button>
            <!-- Кнопка Telegram встроена через виджет, но добавим отдельную -->
            <div id="telegramWidgetContainer" class="telegram-widget-container"></div>
        </div>
        
        <!-- Блок информации о пользователе (показывается авторизованным) -->
        <div id="userInfo" class="user-info" style="display: none;">
            <img id="userAvatar" class="user-avatar-small" src="" alt="Avatar">
            <span id="userName" class="user-name-small"></span>
            <button id="logoutBtn" class="logout-btn-small">Выйти</button>
        </div>
    </header>
    
    <div class="main-wrapper">
        <!-- Боковая панель с профилем -->
        <aside class="profile-sidebar">
            <div id="profilePanel" class="profile-card">
                <div class="profile-avatar">
                    <img id="profileAvatar" src="https://ui-avatars.com/api/?background=2c3e66&color=fff&bold=true&name=Guest" alt="Avatar">
                </div>
                <div class="profile-info">
                    <h3 id="profileName">Гость</h3>
                    <p id="profileEmail">войдите для доступа к профилю</p>
                    <div class="profile-id">
                        <span>ID: </span>
                        <span id="profileId">guest</span>
                    </div>
                </div>
                <div class="profile-actions">
                    <button id="profileLoginBtn" class="profile-login-btn">🔐 Войти через Google</button>
                    <div id="profileTelegramWidget" class="profile-telegram-widget"></div>
                </div>
            </div>
        </aside>
        
        <main>
            <div id="mainContent">
                <div id="cardsContainer" class="cards-container"></div>
            </div>
            <div id="aboutContainer" style="display: none;">
                <div id="infoBanner" class="center-text interactive-banner">
                    Купить сопровождение или UC в плашке главная
                </div>
            </div>
        </main>
    </div>
    
    <footer>
        <p>© 2026 AWANGARD | <a href="https://vk.com/vip_kotik_1" target="_blank">ВКонтакте</a></p>
    </footer>

    <!-- Скрипт для размещения Telegram виджета в нужных местах -->
    <script>
        (function() {
            // Функция для создания Telegram виджета в контейнере
            function createTelegramWidget(containerId) {
                const container = document.getElementById(containerId);
                if (!container) return;
                
                // Очищаем контейнер
                container.innerHTML = '';
                
                // Создаём скрипт виджета
                const script = document.createElement('script');
                script.async = true;
                script.src = 'https://telegram.org/js/telegram-widget.js?23';
                script.setAttribute('data-telegram-login', 'awangard_shop_bot');
                script.setAttribute('data-size', 'large');
                script.setAttribute('data-onauth', 'onTelegramAuth(user)');
                script.setAttribute('data-request-access', 'write');
                container.appendChild(script);
            }
            
            // Создаём виджеты после загрузки страницы
            setTimeout(() => {
                // Создаём контейнер для Telegram кнопки в шапке
                const headerContainer = document.createElement('div');
                headerContainer.id = 'telegramWidgetHeader';
                headerContainer.style.display = 'inline-block';
                headerContainer.style.marginLeft = '0.5rem';
                const authButtonsDiv = document.getElementById('authButtons');
                if (authButtonsDiv) {
                    authButtonsDiv.appendChild(headerContainer);
                    createTelegramWidget('telegramWidgetHeader');
                }
                
                // Создаём контейнер для Telegram кнопки в профиле
                const profileContainer = document.createElement('div');
                profileContainer.id = 'telegramWidgetProfile';
                profileContainer.style.marginTop = '0.5rem';
                const profileWidgetDiv = document.getElementById('profileTelegramWidget');
                if (profileWidgetDiv) {
                    profileWidgetDiv.appendChild(profileContainer);
                    createTelegramWidget('telegramWidgetProfile');
                }
            }, 100);
            
            var homeLink = document.getElementById('homeLink');
            var aboutLink = document.getElementById('aboutLink');
            var cardsContainer = document.getElementById('cardsContainer');
            var aboutContainer = document.getElementById('aboutContainer');
            var infoBanner = document.getElementById('infoBanner');
            var profileLoginBtn = document.getElementById('profileLoginBtn');
            
            if (profileLoginBtn) {
                profileLoginBtn.addEventListener('click', function() {
                    if (typeof window.loginWithGoogle === 'function') {
                        window.loginWithGoogle();
                    }
                });
            }

            var ucCardsData = [
                { text: "60 UC", price: "100 руб." },
                { text: "300+25 UC", price: "450 руб." },
                { text: "600+60 UC", price: "900 руб." },
                { text: "1500+300 UC", price: "2200 руб." },
                { text: "3000+850 UC", price: "4500 руб." },
                { text: "6000+2100 UC", price: "9000 руб." }
            ];

            var supportCardsData = [
                { text: "1 000 000 метровалюты", price: "100 руб." },
                { text: "2 000 000 метровалюты", price: "200 руб." },
                { text: "3 000 000 метровалюты", price: "300 руб." },
                { text: "4 000 000 метровалюты", price: "400 руб." },
                { text: "5 000 000 метровалюты", price: "500 руб." },
                { text: "6 000 000 метровалюты", price: "600 руб." },
                { text: "7 000 000 метровалюты", price: "700 руб." },
                { text: "8 000 000 метровалюты", price: "800 руб." },
                { text: "9 000 000 метровалюты", price: "900 руб." },
                { text: "10 000 000 метровалюты", price: "1000 руб." }
            ];

            function showPaymentPopup(cardText, price) {
                alert("Оплатить " + cardText + " - " + price);
            }

            function openInfoWindow() {
                var message = "Привет! Я создал этот сайт сам, и пока он сырой, но вы можете что-нибудь купить и поддержать меня, а также оставьте отзыв, пж!";
                var newWindow = window.open('', '_blank', 'width=500,height=300,resizable=yes,scrollbars=yes');
                newWindow.document.write('<!DOCTYPE html><html><head><title>Информация</title><style>body{font-family:Arial;background:#0a0e17;color:#c0caf5;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;padding:20px;text-align:center;} .message{background:#1a1f2e;padding:30px;border-radius:20px;border:1px solid #2c3142;}</style></head><body><div class="message">' + message + '</div></body></html>');
                newWindow.document.close();
            }

            if (infoBanner) {
                infoBanner.addEventListener('click', openInfoWindow);
            }

            function createCards() {
                if (!cardsContainer) return;
                cardsContainer.innerHTML = '';
                
                for (var i = 0; i < ucCardsData.length; i++) {
                    var card = document.createElement('div');
                    card.className = 'card';
                    card.textContent = ucCardsData[i].text;
                    (function(cardText, price) {
                        card.addEventListener('click', function() {
                            showPaymentPopup(cardText, price);
                        });
                    })(ucCardsData[i].text, ucCardsData[i].price);
                    cardsContainer.appendChild(card);
                }
                
                for (var i = 0; i < supportCardsData.length; i++) {
                    var card = document.createElement('div');
                    card.className = 'card';
                    card.textContent = supportCardsData[i].text;
                    (function(cardText, price) {
                        card.addEventListener('click', function() {
                            showPaymentPopup(cardText, price);
                        });
                    })(supportCardsData[i].text, supportCardsData[i].price);
                    cardsContainer.appendChild(card);
                }
            }

            function showAbout() {
                if (cardsContainer) cardsContainer.style.display = 'none';
                if (aboutContainer) aboutContainer.style.display = 'block';
            }

            function showHome() {
                if (cardsContainer) {
                    cardsContainer.style.display = 'grid';
                    createCards();
                }
                if (aboutContainer) aboutContainer.style.display = 'none';
            }

            if (homeLink) {
                homeLink.addEventListener('click', function(e) {
                    e.preventDefault();
                    homeLink.classList.add('active');
                    if (aboutLink) aboutLink.classList.remove('active');
                    showHome();
                });
            }

            if (aboutLink) {
                aboutLink.addEventListener('click', function(e) {
                    e.preventDefault();
                    aboutLink.classList.add('active');
                    if (homeLink) homeLink.classList.remove('active');
                    showAbout();
                });
            }

            createCards();
        })();
    </script>
</body>
</html>
