<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWANGARD.COM | Dark Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <header>
        <h1>🌙 кукусики!</h1>
        <nav>
            <a href="#" id="homeLink" class="active">Главная</a>
            <a href="#" id="aboutLink">О нас</a>
            <a href="https://vk.com/vip_kotik_1" target="_blank">📱 Мой ВК</a>
        </nav>
    </header>
    <main>
        <div id="cardsContainer" class="cards-container"></div>
    </main>
    <footer>
        <p>© 2026 AWANGARD | <a href="https://vk.com/vip_kotik_1" target="_blank">ВКонтакте</a></p>
    </footer>

    <script>
        (function() {
            var homeLink = document.getElementById('homeLink');
            var aboutLink = document.getElementById('aboutLink');
            var cardsContainer = document.getElementById('cardsContainer');

            // Данные для UC карточек с ценами (первые 6 с бонусами и ценами, остальные 4 обычные без клика)
            var ucCardsData = [
                { text: "60 UC", price: "100 руб." },
                { text: "300+25 UC", price: "450 руб." },
                { text: "600+60 UC", price: "900 руб." },
                { text: "1500+300 UC", price: "2200 руб." },
                { text: "3000+850 UC", price: "4500 руб." },
                { text: "6000+2100 UC", price: "9000 руб." },
                { text: "UC", price: null },
                { text: "UC", price: null },
                { text: "UC", price: null },
                { text: "UC", price: null }
            ];

            // Данные для карточек Сопровождение (10 штук, без изменений, без клика)
            var supportCardsData = [
                "Сопровождение", "Сопровождение", "Сопровождение", "Сопровождение", "Сопровождение",
                "Сопровождение", "Сопровождение", "Сопровождение", "Сопровождение", "Сопровождение"
            ];

            // Функция показа всплывающего окна
            function showPaymentPopup(cardText, price) {
                alert("Оплатить " + cardText + " - " + price);
            }

            function createCards() {
                cardsContainer.innerHTML = '';
                
                // Создаём 10 карточек UC
                for (var i = 0; i < ucCardsData.length; i++) {
                    var card = document.createElement('div');
                    card.className = 'card';
                    card.textContent = ucCardsData[i].text;
                    
                    // Если у карточки есть цена - добавляем обработчик клика
                    if (ucCardsData[i].price !== null) {
                        (function(cardText, price) {
                            card.addEventListener('click', function() {
                                showPaymentPopup(cardText, price);
                            });
                        })(ucCardsData[i].text, ucCardsData[i].price);
                    }
                    
                    cardsContainer.appendChild(card);
                }
                
                // Создаём 10 карточек Сопровождение (без клика)
                for (var i = 0; i < supportCardsData.length; i++) {
                    var card = document.createElement('div');
                    card.className = 'card';
                    card.textContent = supportCardsData[i];
                    cardsContainer.appendChild(card);
                }
            }

            function showAbout() {
                cardsContainer.innerHTML = '';
                var message = document.createElement('div');
                message.className = 'info-message';
                message.textContent = 'Страница "О нас" в разработке';
                cardsContainer.appendChild(message);
            }

            if (homeLink) {
                homeLink.addEventListener('click', function(e) {
                    e.preventDefault();
                    homeLink.classList.add('active');
                    aboutLink.classList.remove('active');
                    createCards();
                });
            }

            if (aboutLink) {
                aboutLink.addEventListener('click', function(e) {
                    e.preventDefault();
                    aboutLink.classList.add('active');
                    homeLink.classList.remove('active');
                    showAbout();
                });
            }

            createCards();
        })();
    </script>
</body>
</html>
